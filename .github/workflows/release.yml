name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag, for example v1.0.25'
        required: true
        type: string
      release_notes:
        description: '新版本内容，会显示在应用内更新提示和 Release 正文顶部'
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
  RELEASE_NOTES: ${{ github.event_name == 'workflow_dispatch' && inputs.release_notes || '## 新版本内容\n\n- 本次更新内容稍后补充。' }}
  DOWNLOAD_GUIDE: |
    ## 下载建议

    - Windows 安装版（推荐大多数用户）：下载 `better-douyin-R-v*-windows-x64-installer.exe`
    - Windows 便携版（免安装）：下载 `better-douyin-R-v*-windows-x64-portable.zip`，解压后运行里面的 exe
    - macOS Apple Silicon / M 系列：下载 `better-douyin-R-v*-macos-arm64.dmg`，免安装可下 `better-douyin-R-v*-macos-arm64-portable.zip`
    - macOS Intel：下载 `better-douyin-R-v*-macos-x64.dmg`，免安装可下 `better-douyin-R-v*-macos-x64-portable.zip`
    - Linux Debian/Ubuntu：下载 `better-douyin-R-v*-linux-x64.deb`
    - Linux Fedora/openSUSE/RHEL：下载 `better-douyin-R-v*-linux-x64.rpm`
    - Linux 通用便携：下载 `better-douyin-R-v*-linux-x64.AppImage`

    `*-updater.*`、`.sig` 和 `latest.json` / `windows.json` / `darwin.json` / `linux.json` 主要用于自动更新和签名校验，普通安装通常不需要手动下载。

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            label: macos-arm64
          - target: x86_64-apple-darwin
            label: macos-x64
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: cargo tauri
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: 'better-douyin-R ${{ env.RELEASE_TAG }}'
          releaseBody: ${{ env.RELEASE_NOTES }}
          releaseDraft: false
          prerelease: false
          retryAttempts: 5
          args: --target ${{ matrix.target }} -b app -b dmg

      - name: Normalize release asset names
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ env.RELEASE_TAG }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/rename-release-assets.mjs

      - name: Package portable macOS zip
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          APP_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          APP_PATH="$(find "$APP_DIR" -maxdepth 1 -name "*.app" -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "Could not find built .app bundle"
            find "src-tauri/target" -maxdepth 6 -name "*.app" -print || true
            exit 1
          fi
          DEST="better-douyin-R-v${VERSION}-${{ matrix.label }}-portable.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$DEST"
          echo "Created: $DEST"

      - name: Upload portable macOS zip to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: false
          files: better-douyin-R-v*-${{ matrix.label }}-portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows-installer:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app (NSIS installer)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: cargo tauri
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: 'better-douyin-R ${{ env.RELEASE_TAG }}'
          releaseBody: ${{ env.RELEASE_NOTES }}
          releaseDraft: false
          prerelease: false
          retryAttempts: 5
          args: --target x86_64-pc-windows-msvc -b nsis

      - name: Normalize release asset names
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ env.RELEASE_TAG }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/rename-release-assets.mjs

  build-windows-portable:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2"

      - name: Build portable exe
        run: cargo tauri build --target x86_64-pc-windows-msvc --no-bundle

      - name: Package portable exe
        shell: pwsh
        run: |
          $candidates = @(
            "src-tauri\target\x86_64-pc-windows-msvc\release",
            "src-tauri\target\release"
          ) | Where-Object { Test-Path $_ }

          $exePath = $null
          foreach ($dir in $candidates) {
            $match = Get-ChildItem -Path $dir -Filter "*.exe" -File |
              Where-Object { $_.Name -notmatch "setup|installer|uninstall" } |
              Select-Object -First 1
            if ($match) {
              $exePath = $match.FullName
              break
            }
          }

          if (-not $exePath) {
            Write-Error "Could not find built portable exe"
            Get-ChildItem -Path "src-tauri\target" -Recurse -Filter "*.exe" | ForEach-Object { Write-Output $_.FullName }
            exit 1
          }

          $version = "${env:RELEASE_TAG}" -replace '^v',''
          $updaterExe = "better-douyin-R-v${version}-windows-x64-portable.exe"
          $portableExe = "better-douyin-R.exe"
          Copy-Item $exePath $updaterExe
          Copy-Item $exePath $portableExe
          Write-Output "Created: $updaterExe"
          Write-Output "Created: $portableExe"

          $readme = @"
          better-douyin-R Windows portable
          ================================

          解压后双击 $portableExe 即可启动。

          如果程序没有窗口或无法启动，请先安装 Microsoft Edge WebView2 Runtime：
          https://developer.microsoft.com/microsoft-edge/webview2/
          "@
          $readme | Set-Content -Path "README-Windows-Portable.txt" -Encoding UTF8
          Compress-Archive -Path $portableExe, "README-Windows-Portable.txt" -DestinationPath "better-douyin-R-v${version}-windows-x64-portable.zip" -Force
          Write-Output "Created: better-douyin-R-v${version}-windows-x64-portable.zip"

      - name: Sign portable assets
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $portable = Get-ChildItem -Path . -Filter "better-douyin-R-v*-windows-x64-portable.exe" -File | Select-Object -First 1
          if (-not $portable) {
            Write-Error "Could not find portable exe to sign"
            exit 1
          }
          cargo tauri signer sign $portable.FullName

          $portableZip = Get-ChildItem -Path . -Filter "better-douyin-R-v*-windows-x64-portable.zip" -File | Select-Object -First 1
          if (-not $portableZip) {
            Write-Error "Could not find portable zip to sign"
            exit 1
          }
          cargo tauri signer sign $portableZip.FullName

      - name: Upload portable assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: false
          files: |
            better-douyin-R-v*-windows-x64-portable.exe
            better-douyin-R-v*-windows-x64-portable.exe.sig
            better-douyin-R-v*-windows-x64-portable.zip
            better-douyin-R-v*-windows-x64-portable.zip.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: cargo tauri
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: 'better-douyin-R ${{ env.RELEASE_TAG }}'
          releaseBody: ${{ env.RELEASE_NOTES }}
          releaseDraft: false
          prerelease: false
          retryAttempts: 5
          args: --target x86_64-unknown-linux-gnu -b deb -b rpm -b appimage

      - name: Normalize release asset names
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ env.RELEASE_TAG }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/rename-release-assets.mjs

  finalize-updater:
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows-installer
      - build-windows-portable
      - build-linux
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify and publish updater metadata aliases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail

          gh release download "$VERSION" \
            --repo "${{ github.repository }}" \
            --pattern latest.json \
            --output latest.json

          gh release download "$VERSION" \
            --repo "${{ github.repository }}" \
            --pattern '*.sig'
          node scripts/rename-release-assets.mjs
          node scripts/finalize-updater-metadata.mjs

          release_body="$(mktemp)"
          printf '%s\n\n%s\n' "$RELEASE_NOTES" "$DOWNLOAD_GUIDE" > "$release_body"
          gh release edit "$VERSION" \
            --repo "${{ github.repository }}" \
            --notes-file "$release_body"

          gh release upload "$VERSION" latest.json darwin.json windows.json linux.json \
            --repo "${{ github.repository }}" \
            --clobber
